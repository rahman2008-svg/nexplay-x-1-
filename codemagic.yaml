workflows:
  nexplay_x_build:
    name: NexPlay X CI Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Show project files
        script: ls -la

      - name: Make gradlew executable
        script: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Setup local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        script: |
          if [ -f "./gradlew" ]; then
            ./gradlew clean
            ./gradlew assembleRelease
          else
            echo "ERROR: gradlew not found! Please add Gradle wrapper"
            exit 1
          fi

    artifacts:
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
