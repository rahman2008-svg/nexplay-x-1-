workflows:
  nexplay_x_build:
    name: NexPlay X Debug Build

    environment:
      java: 17

    scripts:
      - name: Setup
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: chmod +x gradlew

      - name: Build Debug APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
