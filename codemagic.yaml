workflows:
  nexplay_x_debug:
    name: NexPlay X Debug Build (Stable)

    max_build_duration: 60

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    scripts:
      - name: Show project files
        script: ls -la

      - name: Setup local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Ensure gradlew permission
        script: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Clean project
        script: |
          if [ -f "./gradlew" ]; then
            ./gradlew clean
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
